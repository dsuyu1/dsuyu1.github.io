# Site settings
title: dsuyu
author: Damian Villarreal
email: damian.villarreal01@utrgv.edu
description: >-
  Notes on software, security, and systems from Damian Villarreal —
  a computer science student writing about what he builds and breaks.

baseurl: "" # production site is served at the domain root
url: "https://damianvillarreal.com" # production hostname
github_username: dsuyu1

# Navigation. Add an entry here and it shows up in the header — that's the
# whole mechanism. Order is preserved.
nav:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: About
    url: /about/

# Build settings
# No `theme:` key — the layouts and includes in this repo are the whole theme.
# jekyll-seo-tag must be listed explicitly; it previously loaded transitively
# as a dependency of the minima gem.
plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - README.md
