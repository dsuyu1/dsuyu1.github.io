<footer class="site-footer">
  <div class="wrap footer-inner">
    <p class="footer-meta">
      &copy; {{ 'now' | date: "%Y" }} {{ site.author | default: site.title }}
    </p>

    <ul class="footer-links">
      <li>
        <a href="https://github.com/{{ site.github_username }}" rel="me noopener" target="_blank">GitHub</a>
      </li>
      <li>
        <a href="mailto:{{ site.email }}">Email</a>
      </li>
      <li>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </li>
    </ul>
  </div>
</footer>
