<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/Waseda.webp' | relative_url }}" type="image/webp">

  {%- feed_meta -%}

  <script>
    // Runs before first paint so a dark-mode visitor never sees a light flash.
    // Both themes live in one stylesheet keyed off this attribute, so there is
    // no second <link> to enable and no window where the wrong theme applies.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem("theme"); } catch (e) {}
      var dark = stored
        ? stored === "dark"
        : window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = dark ? "dark" : "light";
    })();
  </script>
</head>
