<header class="site-header">
  <div class="wrap header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav class="site-nav" aria-label="Main">
      {%- for item in site.nav -%}
        {%- assign target = item.url | relative_url -%}
        <a href="{{ target }}"
           class="nav-link"
           {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
      {%- endfor -%}

      <button type="button" id="theme-toggle" class="theme-toggle"
              aria-label="Switch between light and dark theme">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
